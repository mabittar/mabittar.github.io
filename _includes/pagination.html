<div class="container">
<nav class="pagination" role="pagination" aria-label="Pagination">
<ul>
{% if paginator.previous_page %}
{% if paginator.previous_page == 1 %}
<p><a class="newer-posts" href="{{ site.baseurl }}/" aria-label="Newer posts"><i class="fas fa-arrow-left" aria-hidden="true"></i></a></p>
{% else %}
<p><a class="newer-posts" href="{{ site.baseurl }}/page/{{ paginator.previous_page }}/" aria-label="Newer posts"><i class="fas fa-arrow-left" aria-hidden="true"></i></a></p>
{% endif %}
{% endif %}

{% if paginator.total_pages > 1 %}
<p><span class="page-number">Page {{paginator.page}} of {{paginator.total_pages}}</span></p>
{% endif %}

{% if paginator.next_page %}
<p><a class="older-posts" href="{{ site.baseurl }}/page/{{ paginator.next_page }}/" aria-label="Older posts"><i class="fas fa-arrow-right" aria-hidden="true"></i></a></p>
{% endif %}
</ul>
</nav>
</div>
